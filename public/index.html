<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>opiabrowser</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="window">
    <div class="tabbar">
      <div id="tabs" class="tabs"></div>
      <button id="newTabBtn" class="tabAdd" title="New tab">+</button>
    </div>
    <div class="toolbar">
      <button id="backBtn" title="Back">←</button>
      <button id="forwardBtn" title="Forward">→</button>
      <button id="refreshBtn" title="Refresh">↻</button>
      <span id="security" class="security unknown" title="Connection security">○</span>
      <input id="urlInput" type="text" value="https://example.com" />
      <button id="goBtn">Go</button>
    </div>
    <div class="meta"><span id="title">No page loaded</span><span id="status">disconnected</span></div>
    <div class="viewportWrap">
      <img id="viewport" alt="browser viewport" draggable="false" />
    </div>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
