<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>opiabrowser (RBI Simple)</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <button id="backBtn" title="Back">←</button>
    <button id="forwardBtn" title="Forward">→</button>
    <button id="refreshBtn" title="Refresh">↻</button>
    <input id="urlInput" type="text" value="https://google.com" />
    <button id="goBtn">Go</button>
    <label class="mini"><input id="manualOnly" type="checkbox" checked /> Manual-only</label>
    <span id="status" class="status">connecting...</span>
  </header>

  <main class="viewportWrap">
    <img id="viewport" alt="isolated browser viewport" draggable="false" />
  </main>

  <script type="module" src="/app.js"></script>
</body>
</html>
